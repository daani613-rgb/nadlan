<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחשבון השקעה בנדל"ן 2026 · Real Estate Calculator</title>
<style>
  :root{--blue:#1F4E78;--lblue:#DDEBF7;--green:#E2EFDA;--yellow:#FFF2CC;--gray:#808080;--border:#cbd5e1}
  *{box-sizing:border-box}
  body{font-family:Arial,"Segoe UI",sans-serif;background:#f1f5f9;margin:0;padding:16px;color:#1e293b}
  .wrap{max-width:980px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  h1{color:var(--blue);font-size:22px;margin:0 0 4px}
  .sub{color:var(--gray);font-size:13px;margin:0 0 14px}
  .langbtn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:bold;cursor:pointer;font-size:13px;white-space:nowrap}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:9px;background:#e2e8f0;cursor:pointer;font-weight:bold;font-size:14px;border:none}
  .tab.active{background:var(--blue);color:#fff}
  .panel{display:none}.panel.active{display:block}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
  .card h2{font-size:15px;color:#fff;background:var(--blue);margin:-18px -18px 14px;padding:12px 18px;border-radius:12px 12px 0 0}
  .row{display:flex;justify-content:space-between;align-items:center;margin:9px 0;gap:10px}
  .row label{font-size:14px;flex:1}
  .row input,.row select{width:150px;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:14px;text-align:left;background:var(--yellow);color:#0000FF;font-weight:bold}
  .out .row{border-bottom:1px dashed #e2e8f0;padding-bottom:7px}
  .out .v{font-weight:bold;min-width:120px;text-align:left}
  .key{background:var(--lblue);margin:6px -8px;padding:7px 8px;border-radius:8px}
  .key .v{color:var(--blue)}
  .gn{background:var(--green)}
  .pos{color:#15803d}.neg{color:#b91c1c}
  .note{font-size:11px;color:var(--gray);margin-top:14px;line-height:1.6}
  .big{font-size:18px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--border);padding:7px;text-align:center}
  th{background:var(--blue);color:#fff}
  td.lab{font-weight:bold;background:#eef2f7}
  html[dir=rtl] td.lab{text-align:right}html[dir=ltr] td.lab{text-align:left}
  td input,td select{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--yellow);color:#00f;font-weight:bold;text-align:center}
  textarea{width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:inherit;font-size:14px}
  .btn{border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:bold;font-size:14px}
  .btn-g{background:#16a34a;color:#fff}.btn-b{background:var(--blue);color:#fff}.btn-r{background:#ef4444;color:#fff;padding:4px 9px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1 data-i18n="title"></h1>
      <p class="sub" data-i18n="sub"></p>
    </div>
    <button class="langbtn" id="langBtn" onclick="toggleLang()">English</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-t="calc" data-i18n="tab_calc"></button>
    <button class="tab" data-t="sale" data-i18n="tab_sale"></button>
    <button class="tab" data-t="cmp" data-i18n="tab_cmp"></button>
    <button class="tab" data-t="listings" data-i18n="tab_list"></button>
  </div>

  <!-- CALC -->
  <div class="panel active" id="calc">
  <div class="grid">
    <div class="card">
      <h2 data-i18n="h_inputs"></h2>
      <div class="row"><label data-i18n="price"></label><input id="price" type="number" value="2000000"></div>
      <div class="row"><label data-i18n="btype"></label><select id="type"><option value="single" data-i18n="bt_single"></option><option value="improve" data-i18n="bt_improve"></option><option value="invest" data-i18n="bt_invest"></option></select></div>
      <div class="row"><label data-i18n="ltv"></label><input id="ltv" type="number" value="75"></div>
      <div class="row"><label data-i18n="term"></label><input id="years" type="number" value="25"></div>
      <div class="row"><label data-i18n="rate"></label><input id="rate" type="number" value="4.8" step="0.1"></div>
      <div class="row"><label data-i18n="rent"></label><input id="rent" type="number" value="6000"></div>
      <div class="row"><label data-i18n="broker"></label><input id="broker" type="number" value="2" step="0.1"></div>
      <div class="row"><label data-i18n="lawyer"></label><input id="lawyer" type="number" value="0.5" step="0.1"></div>
      <div class="row"><label data-i18n="extra"></label><input id="extra" type="number" value="0"></div>
      <div class="row"><label data-i18n="vat"></label><input id="vat" type="number" value="18"></div>
      <div class="row"><label data-i18n="ratio"></label><input id="ratio" type="number" value="33"></div>
      <hr style="border:none;border-top:1px solid #e2e8f0;margin:10px 0">
      <div class="row"><label data-i18n="arnona"></label><input id="arnona" type="number" value="0"></div>
      <div class="row"><label data-i18n="vaad"></label><input id="vaad" type="number" value="0"></div>
      <div class="row"><label data-i18n="insurance"></label><input id="insurance" type="number" value="0"></div>
      <div class="row"><label data-i18n="maint"></label><input id="maint" type="number" value="5" step="0.5"></div>
      <div class="row"><label data-i18n="mgmt"></label><input id="mgmt" type="number" value="0" step="0.5"></div>
      <div class="row"><label data-i18n="vacancy"></label><input id="vacancy" type="number" value="8.3" step="0.1"></div>
      <div class="row"><label data-i18n="rtrack"></label><select id="rtrack"><option value="auto" data-i18n="rt_auto"></option><option value="exempt" data-i18n="rt_exempt"></option><option value="flat" data-i18n="rt_flat"></option><option value="marginal" data-i18n="rt_marg"></option></select></div>
      <div class="row"><label data-i18n="marg"></label><input id="marg" type="number" value="31"></div>
    </div>
    <div class="card out">
      <h2 data-i18n="h_results"></h2>
      <div class="row key"><label data-i18n="o_tax"></label><span class="v" id="o_tax"></span></div>
      <div class="row"><label data-i18n="o_broker"></label><span class="v" id="o_broker"></span></div>
      <div class="row"><label data-i18n="o_lawyer"></label><span class="v" id="o_lawyer"></span></div>
      <div class="row key"><label data-i18n="o_closing"></label><span class="v" id="o_closing"></span></div>
      <div class="row"><label data-i18n="o_cap"></label><span class="v" id="o_cap"></span></div>
      <div class="row"><label data-i18n="o_mort"></label><span class="v" id="o_mort"></span></div>
      <div class="row key"><label data-i18n="o_equity"></label><span class="v big" id="o_equity"></span></div>
      <div class="row key"><label data-i18n="o_pmt"></label><span class="v big" id="o_pmt"></span></div>
      <div class="row"><label data-i18n="o_income"></label><span class="v" id="o_income"></span></div>
      <div class="row"><label data-i18n="o_interest"></label><span class="v" id="o_interest"></span></div>
      <div class="row key"><label data-i18n="o_yield"></label><span class="v" id="o_yield"></span></div>
      <div class="row"><label data-i18n="o_yield2"></label><span class="v" id="o_yield2"></span></div>
      <div class="row key"><label data-i18n="o_cf"></label><span class="v big" id="o_cf"></span></div>
      <div class="row key"><label data-i18n="o_coc"></label><span class="v" id="o_coc"></span></div>
      <hr style="border:none;border-top:1px solid #e2e8f0;margin:10px 0">
      <div class="row"><label data-i18n="o_exp"></label><span class="v" id="o_exp"></span></div>
      <div class="row"><label data-i18n="o_rtax"></label><span class="v" id="o_rtax"></span></div>
      <div class="row gn"><label data-i18n="o_noi"></label><span class="v" id="o_noi"></span></div>
      <div class="row gn"><label data-i18n="o_caprate"></label><span class="v" id="o_cap2"></span></div>
      <div class="row gn"><label data-i18n="o_nety"></label><span class="v big" id="o_nety"></span></div>
      <div class="row gn"><label data-i18n="o_ncf"></label><span class="v big" id="o_ncf"></span></div>
      <div class="row gn"><label data-i18n="o_ncoc"></label><span class="v" id="o_ncoc"></span></div>
    </div>
  </div>
  <div class="card">
    <h2 data-i18n="h_mix"></h2>
    <p class="note" style="margin-top:0" data-i18n="mix_note"></p>
    <table id="mixTable">
      <thead><tr><th data-i18n="mx_track"></th><th data-i18n="mx_share"></th><th data-i18n="mx_rate"></th><th data-i18n="mx_years"></th><th data-i18n="mx_pay"></th></tr></thead>
      <tbody>
        <tr><td class="lab" data-i18n="mx_prime"></td><td><input type="number" id="mx0s" value="0"></td><td><input type="number" id="mx0r" value="5.5" step="0.1"></td><td><input type="number" id="mx0y" value="25"></td><td id="mx0p">—</td></tr>
        <tr><td class="lab" data-i18n="mx_fixed"></td><td><input type="number" id="mx1s" value="0"></td><td><input type="number" id="mx1r" value="4.5" step="0.1"></td><td><input type="number" id="mx1y" value="25"></td><td id="mx1p">—</td></tr>
        <tr><td class="lab" data-i18n="mx_cpi"></td><td><input type="number" id="mx2s" value="0"></td><td><input type="number" id="mx2r" value="3.2" step="0.1"></td><td><input type="number" id="mx2y" value="25"></td><td id="mx2p">—</td></tr>
      </tbody>
    </table>
    <div class="row" style="margin-top:8px"><label><b data-i18n="mx_total"></b></label><span class="v big" id="mixTotal">—</span></div>
    <div class="row"><label data-i18n="mx_blended"></label><span class="v" id="mixRate">—</span></div>
    <div id="mixWarn" class="note" style="color:#b91c1c;font-weight:bold"></div>
  </div>
  </div>

  <!-- SALE -->
  <div class="panel" id="sale">
  <div class="grid">
    <div class="card">
      <h2 data-i18n="h_saleassum"></h2>
      <div class="row"><label data-i18n="rentGrow"></label><input id="rentGrow" type="number" value="3" step="0.1"></div>
      <div class="row"><label data-i18n="appr"></label><input id="appr" type="number" value="3.5" step="0.1"></div>
      <div class="row"><label data-i18n="holdY"></label><input id="holdY" type="number" value="10"></div>
      <div class="row"><label data-i18n="sellCost"></label><input id="sellCost" type="number" value="2" step="0.1"></div>
      <div class="row"><label data-i18n="exempt"></label><select id="exempt"><option value="no" data-i18n="ex_no"></option><option value="yes" data-i18n="ex_yes"></option></select></div>
      <div class="row"><label data-i18n="infl"></label><input id="infl" type="number" value="2.5" step="0.1"></div>
      <div class="row"><label data-i18n="hinc"></label><select id="hinc"><option value="no" data-i18n="hi_no"></option><option value="yes" data-i18n="hi_yes"></option></select></div>
      <div class="row"><label data-i18n="altRet"></label><input id="altRet" type="number" value="4" step="0.1"></div>
      <p class="note" data-i18n="sale_note"></p>
    </div>
    <div class="card out">
      <h2 data-i18n="h_salesum"></h2>
      <div class="row"><label data-i18n="s_price"></label><span class="v" id="s_price"></span></div>
      <div class="row"><label data-i18n="s_mort"></label><span class="v" id="s_mort"></span></div>
      <div class="row"><label data-i18n="s_cost"></label><span class="v" id="s_cost"></span></div>
      <div class="row"><label data-i18n="s_gain"></label><span class="v" id="s_gain"></span></div>
      <div class="row"><label data-i18n="s_infl"></label><span class="v" id="s_infl"></span></div>
      <div class="row"><label data-i18n="s_real"></label><span class="v" id="s_real"></span></div>
      <div class="row key"><label data-i18n="s_tax"></label><span class="v" id="s_tax"></span></div>
      <div class="row key"><label data-i18n="s_net"></label><span class="v big" id="s_net"></span></div>
      <div class="row"><label data-i18n="s_cum"></label><span class="v" id="s_cum"></span></div>
      <div class="row"><label data-i18n="s_eq"></label><span class="v" id="s_eq"></span></div>
      <div class="row gn"><label data-i18n="s_profit"></label><span class="v big" id="s_profit"></span></div>
      <div class="row gn"><label data-i18n="s_roi"></label><span class="v" id="s_roi"></span></div>
      <div class="row gn"><label data-i18n="s_annual"></label><span class="v" id="s_annual"></span></div>
      <hr style="border:none;border-top:1px solid #e2e8f0;margin:8px 0">
      <div class="row"><label data-i18n="s_alt"></label><span class="v" id="s_alt"></span></div>
      <div class="row key"><label data-i18n="s_adv"></label><span class="v big" id="s_adv"></span></div>
    </div>
  </div>
  </div>

  <!-- COMPARE -->
  <div class="panel" id="cmp">
    <div class="card">
      <h2 data-i18n="h_compare"></h2>
      <table id="cmpTable"><tbody></tbody></table>
    </div>
  </div>

  <!-- LISTINGS -->
  <div class="panel" id="listings">
    <div class="card">
      <h2 data-i18n="h_paste"></h2>
      <p class="note" style="margin-top:0" data-i18n="paste_note"></p>
      <textarea id="pasteBox"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-g" id="parseBtn" data-i18n="btn_parse"></button>
        <button class="btn btn-b" id="emptyRow" data-i18n="btn_empty"></button>
        <span id="parseMsg" class="note" style="align-self:center"></span>
      </div>
    </div>
    <div class="card">
      <h2 data-i18n="h_listtable"></h2>
      <div class="grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="row"><label data-i18n="l_type"></label><select id="l_type"><option value="single" data-i18n="lt_single"></option><option value="improve" data-i18n="lt_improve"></option><option value="invest" selected data-i18n="lt_invest"></option></select></div>
        <div class="row"><label data-i18n="l_ltv"></label><input id="l_ltv" type="number" value="50"></div>
        <div class="row"><label data-i18n="l_rate"></label><input id="l_rate" type="number" value="4.8" step="0.1"></div>
        <div class="row"><label data-i18n="l_years"></label><input id="l_years" type="number" value="25"></div>
      </div>
      <table id="lsTable" style="margin-top:10px"><thead><tr></tr></thead><tbody></tbody></table>
      <p class="note" data-i18n="list_note"></p>
    </div>
  </div>

  <p class="note" id="footNote"></p>
</div>

const singleBr=[[0,1978745,0],[1978745,2347040,.035],[2347040,6055070,.05],[6055070,20183565,.08],[20183565,1e12,.10]];
const addBr=[[0,6055070,.08],[6055070,1e12,.10]];
const caps={single:.75,improve:.70,invest:.50};
const VAT=0.18, CEIL=5654, CEIL_EXEMPT=5008000, VAR_CAP=2/3;
function tax(p,br){let t=0;for(const[a,b,r]of br)t+=Math.max(0,Math.min(p,b)-a)*r;return t;}
function pmt(rate,n,pv){const i=rate/12;return i===0?pv/n:pv*i/(1-Math.pow(1+i,-n));}
function balanceAfter(pv,annualRate,termY,yearsPaid){
  const i=annualRate/12,m=Math.min(yearsPaid*12,termY*12);
  if(yearsPaid>=termY)return 0;
  if(i===0)return Math.max(0,pv-pmt(annualRate,termY*12,pv)*m);
  const p=pmt(annualRate,termY*12,pv);
  return Math.max(0,pv*Math.pow(1+i,m)-p*((Math.pow(1+i,m)-1)/i));
}
function rentalTax(rent,track,marg,expenses,buildingVal){
  const annual=rent*12;let exTaxable;
  if(rent<=CEIL)exTaxable=0;else if(rent>=2*CEIL)exTaxable=annual;else exTaxable=(rent-(2*CEIL-rent))*12;
  const exempt=exTaxable*marg,flat=annual*0.10,marginal=Math.max(0,annual-expenses-buildingVal*0.02)*marg;
  const opts={exempt,flat,marginal};
  const chosen=track==='auto'?Object.keys(opts).reduce((a,b)=>opts[a]<opts[b]?a:b):track;
  return{...opts,chosen,tax:opts[chosen]};
}
function mortgageMix(total){
  let shares=0,monthly=0,blended=0,any=false,varShare=0;
  for(let i=0;i<3;i++){const s=(+$(`mx${i}s`).value||0)/100;shares+=s;if(s>0)any=true;}
  if(!any||shares<=0)return null;
  for(let i=0;i<3;i++){
    const s=(+$(`mx${i}s`).value||0)/100/shares,r=(+$(`mx${i}r`).value||0)/100,y=+$(`mx${i}y`).value||0;
    const p=pmt(r,y*12,total*s);monthly+=p;blended+=r*s;if(i===0)varShare=s;
    $(`mx${i}p`).textContent=fmt(p);
  }
  const warn=varShare>VAR_CAP+1e-9?(LANG==='he'?`⚠️ חלק הפריים (${Math.round(varShare*100)}%) חורג ממגבלת בנק ישראל (עד 66%).`:`⚠️ Prime share (${Math.round(varShare*100)}%) exceeds Bank of Israel limit (max 66%).`):'';
  return{monthly,blended,warn};
}

function model(){
  const price=+$('price').value||0,type=$('type').value;
  const ltvWant=(+$('ltv').value||0)/100,years=+$('years').value||0,rate=(+$('rate').value||0)/100;
  const rent=+$('rent').value||0,vat=(+$('vat').value||0)/100,ratio=(+$('ratio').value||0)/100;
  const t=type==='invest'?tax(price,addBr):tax(price,singleBr);
  const brokerC=price*((+$('broker').value||0)/100)*(1+vat),lawyerC=price*((+$('lawyer').value||0)/100)*(1+vat);
  const extra=+$('extra').value||0,closing=t+brokerC+lawyerC+extra;
  const cap=caps[type],ltv=Math.min(ltvWant,cap),mort=price*ltv;
  const equity=price-mort+closing,mix=mortgageMix(mort);
  const monthly=mix?mix.monthly:(mort>0?pmt(rate,years*12,mort):0);
  return{price,type,years,rate,rent,ratio,t,brokerC,lawyerC,extra,closing,cap,ltv,ltvWant,mort,equity,monthly,mix,totalCost:price+closing};
}
function calc(){
  const m=model();
  $('o_tax').textContent=fmt(m.t);$('o_broker').textContent=fmt(m.brokerC);$('o_lawyer').textContent=fmt(m.lawyerC);
  $('o_closing').textContent=fmt(m.closing);$('o_cap').textContent=pct(m.cap)+(m.ltvWant>m.cap?(LANG==='he'?' (הוגבל)':' (capped)'):'');
  $('o_mort').textContent=fmt(m.mort);$('o_equity').textContent=fmt(m.equity);$('o_pmt').textContent=fmt(m.monthly);
  $('o_income').textContent=fmt(m.ratio>0?m.monthly/m.ratio:NaN);

  const coc=m.equity>0?cf*12/m.equity:NaN,cE=$('o_coc');cE.textContent=pct(coc);cE.className='v '+(coc>=0?'pos':'neg');
  const annualRent=m.rent*12,vacancy=(+$('vacancy').value||0)/100;
  const recurring=((+$('arnona').value||0)+(+$('vaad').value||0)+(+$('insurance').value||0))*12+m.rent*(((+$('maint').value||0)+(+$('mgmt').value||0))/100)*12;
  const rtax=rentalTax(m.rent,$('rtrack').value,(+$('marg').value||0)/100,recurring,m.price*0.7);
  const noi=annualRent*(1-vacancy)-recurring,netAnnual=noi-rtax.tax;
  const trackHe={exempt:T[LANG].rt_exempt,flat:T[LANG].rt_flat,marginal:T[LANG].rt_marg}[rtax.chosen]||rtax.chosen;
  $('o_exp').textContent=fmt(recurring);$('o_rtax').textContent=fmt(rtax.tax)+' ('+trackHe+')';
  $('o_noi').textContent=fmt(noi);$('o_cap2').textContent=m.price>0?pct(noi/m.price):'—';
  $('o_nety').textContent=m.totalCost>0?pct(netAnnual/m.totalCost):'—';
  const ncf=(netAnnual-m.monthly*12)/12,nE=$('o_ncf');nE.textContent=fmt(ncf);nE.className='v big '+(ncf>=0?'pos':'neg');
  $('o_ncoc').textContent=m.equity>0?pct((netAnnual-m.monthly*12)/m.equity):'—';
  if(m.mix){$('mixTotal').textContent=fmt(m.mix.monthly);$('mixRate').textContent=pct(m.mix.blended);$('mixWarn').textContent=m.mix.warn||'';}
  else{$('mixTotal').textContent='—';$('mixRate').textContent='—';$('mixWarn').textContent='';['mx0p','mx1p','mx2p'].forEach(x=>$(x).textContent='—');}
  sale();
}
function sale(){
  const m=model();
  const g=(+$('rentGrow').value||0)/100,ap=(+$('appr').value||0)/100;
  const hold=Math.max(1,+$('holdY').value||1),sc=(+$('sellCost').value||0)/100,exempt=$('exempt').value==='yes';
  const infl=(+$('infl').value||0)/100,hinc=$('hinc').value==='yes';
  const salePrice=m.price*Math.pow(1+ap,hold),remMort=balanceAfter(m.mort,m.rate,m.years,hold);
  const sellCost=salePrice*sc,gain=salePrice-m.totalCost-sellCost;
  const inflAmount=m.totalCost*(Math.pow(1+infl,hold)-1),realGain=Math.max(0,gain-inflAmount);
  let shv=0;
  if(realGain>0){let frac=1;if(exempt)frac=salePrice>CEIL_EXEMPT?(salePrice-CEIL_EXEMPT)/salePrice:0;shv=realGain*frac*(hinc?0.30:0.25);}
  const net=salePrice-sellCost-remMort-shv;
  let cum=0;for(let y=1;y<=hold;y++){cum+=m.rent*12*Math.pow(1+g,y-1)-(y<=m.years?m.monthly*12:0);}
  const profit=net+cum-m.equity,roi=m.equity>0?profit/m.equity:NaN;
  const annual=(m.equity>0&&hold>0)?Math.pow(1+roi,1/hold)-1:NaN;
  $('s_price').textContent=fmt(salePrice);$('s_mort').textContent=fmt(remMort);$('s_cost').textContent=fmt(sellCost);
  $('s_gain').textContent=fmt(gain);$('s_infl').textContent=fmt(inflAmount);$('s_real').textContent=fmt(realGain);
  $('s_tax').textContent=fmt(shv);$('s_net').textContent=fmt(net);$('s_cum').textContent=fmt(cum);$('s_eq').textContent=fmt(m.equity);
  const pE=$('s_profit');pE.textContent=fmt(profit);pE.className='v big '+(profit>=0?'pos':'neg');
  $('s_roi').textContent=pct(roi);$('s_annual').textContent=pct(annual);
  const alt=(+$('altRet').value||0)/100,altFuture=m.equity*Math.pow(1+alt,hold);
  $('s_alt').textContent=fmt(altFuture);
  const adv=profit-(altFuture-m.equity),aE=$('s_adv');aE.textContent=fmt(adv);aE.className='v big '+(adv>=0?'pos':'neg');
}

function calcCmp(){

    const t=type==='invest'?tax(price,addBr):tax(price,singleBr);
    const closing=t+price*0.02*(1+VAT)+price*0.005*(1+VAT);
    const cap=caps[type],ltv=Math.min(ltvW,cap),mort=price*ltv,equity=price-mort+closing;

function parseListing(txt){
  const clean=txt.replace(/[\u200e\u200f]/g,'');
  const nums=s=>{const m=clean.match(s);return m?parseFloat(m[1].replace(/,/g,'')):null;};
  let price=nums(/(?:מחיר|price)[^\d]{0,12}([\d,]{6,})/i);
  if(!price){const m=clean.match(/([\d,]{6,})\s*(?:₪|ש"?ח|שח)/);if(m)price=parseFloat(m[1].replace(/,/g,''));}
  if(!price){const all=[...clean.matchAll(/([\d,]{6,})/g)].map(x=>parseFloat(x[1].replace(/,/g,''))).filter(n=>n>=200000&&n<=100000000);if(all.length)price=Math.max(...all);}
  const rooms=nums(/([\d]+(?:\.5)?)\s*(?:חדרים|חד'|חד׳|חדר|rooms?)/i);
  let sqm=nums(/([\d]+(?:\.\d+)?)\s*(?:מ"ר|מ״ר|מטר|מ׳ר|sqm|sq\.?m)/i);
  if(!sqm)sqm=nums(/(?:שטח|גודל|area|size)[^\d]{0,8}([\d]+)/i);
  const rent=nums(/(?:שכ"?ד|שכר דירה|שכירות|rent)[^\d]{0,12}([\d,]{3,})/i);
  const firstLine=clean.split('\n').map(s=>s.trim()).filter(Boolean)[0]||'';
  return {price,rooms,sqm,rent,desc:firstLine.slice(0,40)};
}
function renderLs(){
  const t=T[LANG],head=$('lsTable').querySelector('thead tr');
  head.innerHTML=`<th>${t.lh_desc}</th><th>${t.lh_price}</th><th>${t.lh_sqm}</th><th>${t.lh_rent}</th><th>${t.lh_ppm}</th><th>${t.lh_tax}</th><th>${t.lh_eq}</th><th>${t.lh_pmt}</th><th>${t.lh_cf}</th><th>${t.lh_y}</th><th></th>`;
  const tb=$('lsTable').querySelector('tbody');tb.innerHTML='';
  lsData.forEach((d,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input data-i="${i}" data-f="desc" value="${d.desc||''}"></td>`+
      `<td><input type="number" data-i="${i}" data-f="price" value="${d.price||0}"></td>`+
      `<td><input type="number" data-i="${i}" data-f="sqm" value="${d.sqm||0}"></td>`+
      `<td><input type="number" data-i="${i}" data-f="rent" value="${d.rent||0}"></td>`+
      `<td id="lc_ppm_${i}"></td><td id="lc_tax_${i}"></td><td id="lc_eq_${i}"></td><td id="lc_pmt_${i}"></td><td id="lc_cf_${i}"></td><td id="lc_y_${i}"></td>`+
      `<td><button class="btn btn-r" data-del="${i}">✕</button></td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll('input').forEach(e=>e.addEventListener('input',ev=>{
    const i=+ev.target.dataset.i,f=ev.target.dataset.f;
    lsData[i][f]=f==='desc'?ev.target.value:(+ev.target.value||0);calcLs();
  }));
  tb.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{lsData.splice(+b.dataset.del,1);renderLs();});
  calcLs();
}
function calcLs(){
  const type=$('l_type').value,ltv=(+$('l_ltv').value||0)/100,rate=(+$('l_rate').value||0)/100,years=+$('l_years').value||0;
  let best=-1,bestY=-1;
  lsData.forEach((d,i)=>{
    const t=type==='invest'?tax(d.price,addBr):tax(d.price,singleBr);
    const closing=t+d.price*0.02*1.18+d.price*0.005*1.18;
    const equity=d.price*(1-ltv)+closing,mort=d.price*ltv;
    const monthly=mort>0?pmt(rate,years*12,mort):0,cf=d.rent-monthly,y=d.price>0?d.rent*12/d.price:0;
    const set=(k,v,cls)=>{const el=$(`lc_${k}_${i}`);if(el){el.textContent=v;if(cls)el.className=cls;}};
    set('ppm',d.sqm>0?fmt(d.price/d.sqm):'—');set('tax',fmt(t));set('eq',fmt(equity));
    set('pmt',fmt(monthly));set('cf',fmt(cf),cf>=0?'pos':'neg');set('y',pct(y));
    if(y>bestY){bestY=y;best=i;}
  });
  $('lsTable').querySelectorAll('tbody tr').forEach((r,idx)=>{
    r.querySelectorAll('td').forEach(td=>{if(!td.querySelector('input,button'))td.style.background=idx===best?'#dcfce7':'';});
  });
}
$('parseBtn').onclick=()=>{
  const txt=$('pasteBox').value.trim(),t=T[LANG];
  if(!txt){$('parseMsg').textContent=t.msg_empty;return;}
  const r=parseListing(txt);
  if(!r.price)$('parseMsg').textContent=t.msg_noprice;
  else $('parseMsg').textContent=`${t.msg_found}: ${fmt(r.price)}${r.sqm?', '+r.sqm+' '+t.lh_sqm:''}`;
  lsData.push({desc:r.desc||t.ls_desc,price:r.price||0,sqm:r.sqm||0,rent:r.rent||0});
  renderLs();$('pasteBox').value='';
};
$('emptyRow').onclick=()=>{lsData.push({desc:'',price:0,sqm:0,rent:0});renderLs();};
document.querySelectorAll('#listings select,#l_ltv,#l_rate,#l_years').forEach(e=>e.addEventListener('input',calcLs));
document.querySelectorAll('#calc input,#calc select,#sale input,#sale select').forEach(e=>e.addEventListener('input',calc));
applyLang();calc();buildCmp();renderLs();
</script>
</body>
