name: Update BoI rate
on:
  schedule:
    - cron: '0 12 * * *'      # יומי, 12:00 UTC
  workflow_dispatch:           # אפשר גם להריץ ידנית מלשונית Actions
permissions:
  contents: write
concurrency:
  group: update-rate
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch current BoI rate
        run: python scripts/update_rate.py || echo "fetch failed — keeping existing rate.json"
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- web/rate.json docs/rate.json 2>/dev/null; then
            git config user.name "rate-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add web/rate.json docs/rate.json 2>/dev/null || true
            git commit -m "עדכון אוטומטי: ריבית בנק ישראל · auto-update BoI rate"
            git push
          else
            echo "אין שינוי בריבית · no rate change"
          fi
